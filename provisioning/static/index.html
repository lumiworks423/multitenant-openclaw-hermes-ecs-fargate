<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenClaw Workshop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
    .container { max-width: 600px; margin: 0 auto; padding: 40px 20px; }
    .logo { text-align: center; margin-bottom: 40px; }
    .logo h1 { font-size: 2rem; color: #fff; }
    .logo p { color: #888; margin-top: 8px; }
    .card { background: #1a1a1a; border: 1px solid #333; border-radius: 12px; padding: 32px; margin-bottom: 20px; }
    .card h2 { margin-bottom: 20px; font-size: 1.3rem; }
    input { width: 100%; padding: 12px 16px; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #fff; font-size: 1rem; margin-bottom: 12px; outline: none; }
    input:focus { border-color: #4a9eff; }
    button { width: 100%; padding: 12px; background: #4a9eff; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 600; }
    button:hover { background: #3a8eef; }
    button:disabled { background: #333; cursor: not-allowed; }
    .btn-secondary { background: #333; margin-top: 8px; }
    .btn-secondary:hover { background: #444; }
    .btn-danger { background: #e74c3c; }
    .error { color: #e74c3c; margin-bottom: 12px; font-size: 0.9rem; }
    .success { color: #2ecc71; margin-bottom: 12px; font-size: 0.9rem; }
    .instance-card { background: #111; border: 1px solid #2ecc71; border-radius: 8px; padding: 20px; margin-top: 16px; }
    .instance-card .status { color: #2ecc71; font-weight: 600; }
    .instance-card a { color: #4a9eff; text-decoration: none; word-break: break-all; }
    .instance-card a:hover { text-decoration: underline; }
    .token-box { background: #0a0a0a; border: 1px solid #333; border-radius: 4px; padding: 8px 12px; font-family: monospace; font-size: 0.85rem; margin-top: 8px; word-break: break-all; }
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; }
    .tab { padding: 8px 16px; border-radius: 6px; cursor: pointer; background: #222; border: 1px solid #333; color: #888; }
    .tab.active { background: #4a9eff; color: #fff; border-color: #4a9eff; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .admin-table th, .admin-table td { padding: 8px; text-align: left; border-bottom: 1px solid #222; }
    .admin-table th { color: #888; }
    .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; }
    .badge-available { background: #1a3a1a; color: #2ecc71; }
    .badge-assigned { background: #1a2a3a; color: #4a9eff; }
    .hidden { display: none; }
    .link-row { margin-top: 12px; text-align: center; }
    .link-row a { color: #4a9eff; text-decoration: none; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>🦞 OpenClaw Workshop</h1>
      <p>Your personal AI assistant on AWS</p>
    </div>
    <div id="app"></div>
  </div>
  <script src="/assets/app.js"></script>
</body>
</html>
